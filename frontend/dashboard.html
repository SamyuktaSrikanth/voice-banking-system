<!DOCTYPE html>
<html>
<head>
    <title>Voice Banking Dashboard</title>
</head>
<body>

<h2>🎤 Voice Banking Dashboard</h2>

<button onclick="startRecording()">Start Voice Command</button>
<button onclick="stopRecording()">Stop</button>

<br><br>

<p><b>📝 Transcript:</b> <span id="transcript"></span></p>
<p><b>🌍 Language:</b> <span id="language"></span></p>
<p><b>💬 System Response:</b> <span id="response"></span></p>


<p><b>🧠 Intent:</b> <span id="intent"></span></p>
<p><b>💰 Amount:</b> <span id="amount"></span></p>
<p><b>👤 Receiver:</b> <span id="receiver"></span></p>


<script>
let mediaRecorder;
let audioChunks = [];

async function startRecording() {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);

    audioChunks = [];

    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

    mediaRecorder.onstop = async () => {
        const blob = new Blob(audioChunks, { type: "audio/webm" });

        const formData = new FormData();
        formData.append("file", blob, "voice.webm");
        formData.append("user_id", localStorage.getItem("user_id"));

        const res = await fetch("http://127.0.0.1:8000/voice-command", {
            method: "POST",
            body: formData
        });

        const data = await res.json();
        if (data.error) {
            alert(data.error);

            // Clear old values (important)
            document.getElementById("intent").innerText = "";
            document.getElementById("amount").innerText = "";
            document.getElementById("receiver").innerText = "";

            return;
        }
        if (data.confirm) {
            const userConfirm = confirm(data.message);

            if (!userConfirm) {
                alert("Transaction cancelled");
                return;
            }

            
            alert("Confirmed !");
            
            const res2 = await fetch("http://127.0.0.1:8000/confirm-transaction", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    user_id: localStorage.getItem("user_id"),  
                    receiver_id: data.receiver, //customerID
                    amount: data.amount
                })
            });

            const result = await res2.json();

            if (result.message) {
                alert(result.message);
            } else {
                alert(result.error);
            }
        }

        

        document.getElementById("transcript").innerText = data.original_text;
        document.getElementById("language").innerText = data.language;
        document.getElementById("response").innerText = data.translated_text;

        document.getElementById("intent").innerText = data.intent;
        document.getElementById("amount").innerText = data.amount;
        document.getElementById("receiver").innerText = data.receiver;
    };

    mediaRecorder.start();
}

function stopRecording() {
    mediaRecorder.stop();
}
</script>

</body>
</html>
