<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <script>
document.addEventListener("DOMContentLoaded", function() {

let mediaRecorder;
let audioChunks = [];

function toggleVoiceUpload(checkbox) {
    const voiceSection = document.getElementById("voiceSection");
    const submitBtn = document.getElementById("submitBtn");

    if (checkbox.checked) {
        voiceSection.style.display = "block";
        submitBtn.disabled = false;
    } else {
        voiceSection.style.display = "none";
        submitBtn.disabled = true;
    }
}

window.toggleVoiceUpload = toggleVoiceUpload; // expose to HTML

async function startRecording() {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);

    audioChunks = [];

    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

    mediaRecorder.onstop = () => {
        const blob = new Blob(audioChunks, { type: "audio/webm" });

        const file = new File([blob], "voice.webm");
        const dt = new DataTransfer();
        dt.items.add(file);

        document.getElementById("audioFile").files = dt.files;
    };

    mediaRecorder.start();
}

function stopRecording() {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
}

window.startRecording = startRecording;
window.stopRecording = stopRecording;

// ✅ THIS NOW WORKS
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = new FormData(this);
    alert("1");
    const res = await fetch("http://127.0.0.1:8000/login", {
        method: "POST",
        body: formData
    });

    alert("2");
    const data = await res.json();

    alert("3");

    if (res.ok) {
        alert("OK");
        window.location.href =   "file:///D:/6thSemester/voice-banking-system/frontend/dashboard.html";
    } else {
        alert("NOT OK");
        alert(data.detail);
    }
});

});
</script>
</head>
<body>

<h2>Login</h2>

<form id="loginForm">

    <label>Customer ID:</label><br>
    <input type="text" name="customer_id" required><br><br>

    <label>Password:</label><br>
    <input type="password" name="password" required><br><br>

    <!-- Checkbox -->
    <input type="checkbox" onchange="toggleVoiceUpload(this)">
    Agree to proceed with voice-based banking interface
    <br><br>

    <!-- Hidden voice -->
    <div id="voiceSection" style="display:none;">
        <label>Voice Captcha:</label><br><br>

        <button type="button" onclick="startRecording()">🎤 Start Recording</button>
        <button type="button" onclick="stopRecording()">⏹ Stop</button>

        <br><br>

        <!-- Hidden file input -->
        <input type="file" id="audioFile" name="file" style="display:none;">
    </div>

    <button type="submit" id="submitBtn" disabled>Login</button>

</form>

<br>

<!-- 🔗 LINK BACK TO SIGNUP -->
<p>
    Don’t have an account?
    <a href="signup.html">Signup here</a>
</p>

</body>
</html>
